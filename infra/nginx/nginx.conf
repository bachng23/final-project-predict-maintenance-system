events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================================================
    # REVERSE PROXY CONFIGURATION
    # ============================================================================
    # 
    # This Nginx server block acts as a reverse proxy for multiple backend
    # services and enforces strict routing policies.
    #
    # SECURITY REQUIREMENTS TO PREVENT DIRECT BACKEND ACCESS:
    # ============================================================================
    #
    # 1. BACKEND APPLICATION BINDING (CRITICAL):
    #    - Configure Node.js/Express to bind ONLY to 127.0.0.1:3000 (localhost)
    #    - Configure Python/FastAPI to bind ONLY to 127.0.0.1:8000 (localhost)
    #    - DO NOT bind to 0.0.0.0 or external IPs
    #
    #    Example for Node.js (in your server.js):
    #      app.listen(3000, '127.0.0.1', () => { ... })
    #
    #    Example for FastAPI (in your main.py):
    #      uvicorn.run(app, host='127.0.0.1', port=8000)
    #
    # 2. FIREWALL RULES:
    #    - Block incoming traffic to ports 3000 and 8000 from external IPs
    #    - Allow only Nginx to communicate with backend services on these ports
    #    - Example ufw commands (Ubuntu/Debian):
    #      ufw allow 80/tcp        # Allow HTTP to Nginx
    #      ufw allow 443/tcp       # Allow HTTPS to Nginx
    #      ufw deny 3000/tcp       # Block direct Express access
    #      ufw deny 8000/tcp       # Block direct FastAPI access
    #
    # 3. DOCKER NETWORKING:
    #    If using Docker, specify backend services to bind to 127.0.0.1 or
    #    use internal Docker networks that Nginx can access but are not exposed.
    #
    # ============================================================================

    server {
        listen 80;
        server_name _;

        # ========================================================================
        # LOGGING
        # ========================================================================
        access_log /var/log/nginx/reverse_proxy_access.log;
        error_log /var/log/nginx/reverse_proxy_error.log warn;

        # ========================================================================
        # ROUTE 1: API ENDPOINTS → Express.js (port 3000)
        # ========================================================================
        location /api/ {
            # Upstream backend reference (configure based on your deployment)
            # For local development: http://127.0.0.1:3000
            # For Docker Compose: http://web_backend:3000
            proxy_pass http://127.0.0.1:3000;

            # ====================================================================
            # REVERSE PROXY HEADERS (Essential for correct backend behavior)
            # ====================================================================
            
            # Preserve the original Host header sent by the client
            # Required for virtual host routing and CSRF protection
            proxy_set_header Host $host;

            # Pass the client's real IP address to the backend
            # FastAPI/Express can use this for logging and rate limiting
            proxy_set_header X-Real-IP $remote_addr;

            # Chain of IPs if request passed through multiple proxies
            # Useful for tracking the full request path in logs
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Preserve the original request protocol (http or https)
            # Backend uses this to generate correct redirect URLs and determine
            # if the connection was secure (important for secure cookies)
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass the original request port (useful for virtual host detection)
            proxy_set_header X-Forwarded-Port $server_port;

            # ====================================================================
            # CONNECTION SETTINGS
            # ====================================================================
            
            # Use HTTP/1.1 for better connection reuse with the backend
            proxy_http_version 1.1;

            # Set appropriate timeouts (adjust based on your API response times)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Enable buffering for better performance
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # ====================================================================
            # PATH HANDLING
            # ====================================================================
            # 
            # proxy_pass with trailing slash: strips "/api" from the request path
            # Example: Client request /api/users → Backend receives /users
            # This is the RECOMMENDED approach for API routing
            #
        }

        # ========================================================================
        # ROUTE 2: AI ENDPOINTS → Python/FastAPI (port 8000)
        # ========================================================================
        location /ai/ {
            # Upstream backend reference (configure based on your deployment)
            # For local development: http://127.0.0.1:8000
            # For Docker Compose: http://ai_backend:8000
            proxy_pass http://127.0.0.1:8000;

            # ====================================================================
            # REVERSE PROXY HEADERS
            # ====================================================================
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # ====================================================================
            # CONNECTION SETTINGS
            # ====================================================================
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable buffering for streaming AI model responses (optional)
            # Uncomment if you need real-time streaming responses:
            # proxy_buffering off;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # ====================================================================
            # PATH HANDLING
            # ====================================================================
            # 
            # proxy_pass with trailing slash: strips "/ai" from the request path
            # Example: Client request /ai/predict → Backend receives /predict
            # This is the RECOMMENDED approach for API routing
            #
        }

        # ========================================================================
        # ROUTE 3: HEALTH CHECK ENDPOINT (Optional)
        # ========================================================================
        # Use this for load balancer health checks or monitoring
        location /health {
            access_log off;
            return 200 "nginx reverse proxy is healthy\n";
            add_header Content-Type text/plain;
        }

        # ========================================================================
        # CATCH-ALL: Deny unmapped routes or return error
        # ========================================================================
        location / {
            return 404 "Route not found. Use /api/* or /ai/* endpoints.\n";
            add_header Content-Type text/plain;
        }
    }

    # ========================================================================
    # OPTIONAL: Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # ========================================================================
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # ... (copy all location blocks from http server above here)
    # }
}